[workspace]
# Conventional commits are used for changelog generation.
# semver_check is disabled workspace-wide: internal crates (byokey-*, ampcode)
# have no external library consumers — git_release_enable = false on all of
# them — so cargo-semver-checks only produces noisy major bumps. Version bumps
# are driven by conventional-commit prefixes (feat/fix/!) alone.
semver_check = false

# Root binary crate — public release artefact.
# git_tag_name produces v0.1.0 instead of the default byokey-v0.1.0.
[[package]]
name = "byokey"
git_tag_name = "v{{ version }}"
git_release_enable = true
git_tag_enable = true

# Internal library crates — published to crates.io, but no individual
# git tags or GitHub releases (only the root byokey tag is created).

[[package]]
name = "byokey-types"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-config"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-store"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-auth"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-provider"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-proxy"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-proto"
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "byokey-daemon"
git_tag_enable = false
git_release_enable = false
changelog_update = false

# Internal TUI — not published. Depends on byokey-proto's `client`
# feature, which postdates the last byokey-proto crates.io release;
# re-enable when byokey-proto's next version ships with that feature.
[[package]]
name = "byokey-tui"
release = false
git_tag_enable = false
git_release_enable = false
changelog_update = false

[[package]]
name = "ampcode"
git_tag_enable = false
git_release_enable = false
changelog_update = false
