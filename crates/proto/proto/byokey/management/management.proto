// BYOKEY management API.
//
// Served over ConnectRPC at /byokey.management.ManagementService/{Method}
// on the main proxy port.

syntax = "proto3";

package byokey.management;

import "google/protobuf/struct.proto";

service ManagementService {
  // Server + per-provider health status.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // In-memory usage snapshot.
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Bucketed persisted usage history.
  rpc GetUsageHistory(GetUsageHistoryRequest) returns (GetUsageHistoryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // All stored provider accounts.
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Delete a stored account (and its token).
  rpc RemoveAccount(RemoveAccountRequest) returns (RemoveAccountResponse);

  // Switch the active account for a provider.
  rpc ActivateAccount(ActivateAccountRequest) returns (ActivateAccountResponse);

  // Latest captured rate-limit headers per provider account.
  rpc GetRateLimits(GetRateLimitsRequest) returns (GetRateLimitsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Paginated list of local Amp CLI thread summaries.
  rpc ListAmpThreads(ListAmpThreadsRequest) returns (ListAmpThreadsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Full content of a single Amp CLI thread.
  rpc GetAmpThread(GetAmpThreadRequest) returns (GetAmpThreadResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// ── status ─────────────────────────────────────────────────────────

message GetStatusRequest {}

message GetStatusResponse {
  ServerInfo server = 1;
  repeated ProviderStatus providers = 2;
}

message ServerInfo {
  string host = 1;
  uint32 port = 2;
}

message ProviderStatus {
  string id = 1;
  string display_name = 2;
  bool enabled = 3;
  AuthStatus auth_status = 4;
  uint32 models_count = 5;
}

enum AuthStatus {
  AUTH_STATUS_UNSPECIFIED = 0;
  AUTH_STATUS_VALID = 1;
  AUTH_STATUS_EXPIRED = 2;
  AUTH_STATUS_NOT_CONFIGURED = 3;
}

// ── usage ──────────────────────────────────────────────────────────

message GetUsageRequest {}

message GetUsageResponse {
  uint64 total_requests = 1;
  uint64 success_requests = 2;
  uint64 failure_requests = 3;
  uint64 input_tokens = 4;
  uint64 output_tokens = 5;
  map<string, ModelStats> models = 6;
}

message ModelStats {
  uint64 requests = 1;
  uint64 success = 2;
  uint64 failure = 3;
  uint64 input_tokens = 4;
  uint64 output_tokens = 5;
}

message GetUsageHistoryRequest {
  // Unix timestamp (seconds). Defaults to 24h before `to`.
  optional int64 from = 1;
  // Unix timestamp (seconds). Defaults to now.
  optional int64 to = 2;
  // Optional model name filter.
  optional string model = 3;
}

message GetUsageHistoryResponse {
  int64 from = 1;
  int64 to = 2;
  int64 bucket_seconds = 3;
  repeated UsageBucket buckets = 4;
  // Set when no persistent usage store is configured.
  optional string error = 5;
}

message UsageBucket {
  int64 period_start = 1;
  string model = 2;
  uint64 request_count = 3;
  uint64 input_tokens = 4;
  uint64 output_tokens = 5;
}

// ── accounts ───────────────────────────────────────────────────────

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated ProviderAccounts providers = 1;
}

message ProviderAccounts {
  string id = 1;
  string display_name = 2;
  repeated AccountDetail accounts = 3;
}

message AccountDetail {
  string account_id = 1;
  optional string label = 2;
  bool is_active = 3;
  TokenState token_state = 4;
  optional uint64 expires_at = 5;
}

enum TokenState {
  TOKEN_STATE_UNSPECIFIED = 0;
  TOKEN_STATE_VALID = 1;
  TOKEN_STATE_EXPIRED = 2;
  TOKEN_STATE_INVALID = 3;
}

message RemoveAccountRequest {
  string provider = 1;
  string account_id = 2;
}

message RemoveAccountResponse {}

message ActivateAccountRequest {
  string provider = 1;
  string account_id = 2;
}

message ActivateAccountResponse {}

// ── ratelimits ─────────────────────────────────────────────────────

message GetRateLimitsRequest {}

message GetRateLimitsResponse {
  repeated ProviderRateLimits providers = 1;
}

message ProviderRateLimits {
  string id = 1;
  string display_name = 2;
  repeated AccountRateLimit accounts = 3;
}

message AccountRateLimit {
  string account_id = 1;
  RateLimitSnapshot snapshot = 2;
}

message RateLimitSnapshot {
  map<string, string> headers = 1;
  uint64 captured_at = 2;
}

// ── amp threads ────────────────────────────────────────────────────

message ListAmpThreadsRequest {
  // Default 50, max 200.
  optional uint32 limit = 1;
  // Default 0.
  optional uint32 offset = 2;
  // Default true (hide empty threads). Tri-state:
  //   true  → only threads with messages
  //   false → only empty threads
  //   unset → all threads
  optional bool has_messages = 3;
}

message ListAmpThreadsResponse {
  repeated AmpThreadSummary threads = 1;
  uint32 total = 2;
}

message AmpThreadSummary {
  string id = 1;
  // Unix epoch milliseconds.
  uint64 created = 2;
  optional string title = 3;
  uint32 message_count = 4;
  optional string agent_mode = 5;
  // Model used in the last assistant response.
  optional string last_model = 6;
  optional uint64 total_input_tokens = 7;
  optional uint64 total_output_tokens = 8;
  uint64 file_size_bytes = 9;
}

message GetAmpThreadRequest {
  string id = 1;
}

message GetAmpThreadResponse {
  AmpThreadDetail thread = 1;
}

message AmpThreadDetail {
  string id = 1;
  // Mutation counter (incremented on every thread change).
  uint64 v = 2;
  // Unix epoch milliseconds.
  uint64 created = 3;
  optional string title = 4;
  optional string agent_mode = 5;
  repeated AmpMessage messages = 6;
  repeated AmpRelationship relationships = 7;
  // Thread environment context (opaque JSON).
  optional google.protobuf.Struct env = 8;
}

message AmpMessage {
  // "user", "assistant", or "info".
  string role = 1;
  uint64 message_id = 2;
  repeated AmpContentBlock content = 3;
  optional AmpUsage usage = 4;
  optional AmpMessageState state = 5;
}

message AmpContentBlock {
  oneof block {
    string text = 1;
    string thinking = 2;
    AmpToolUse tool_use = 3;
    AmpToolResult tool_result = 4;
    // Content block type not recognized by this parser; holds the
    // original `type` field value from the JSON (or empty if absent).
    string unknown_type = 5;
  }
}

message AmpToolUse {
  string id = 1;
  string name = 2;
  // Tool input arguments (opaque JSON object).
  google.protobuf.Struct input = 3;
}

message AmpToolResult {
  string tool_use_id = 1;
  AmpToolRun run = 2;
}

message AmpToolRun {
  // "done", "error", "cancelled", "rejected-by-user", or "blocked-on-user".
  string status = 1;
  optional google.protobuf.Value result = 2;
  optional google.protobuf.Value error = 3;
}

message AmpUsage {
  string model = 1;
  optional uint64 input_tokens = 2;
  optional uint64 output_tokens = 3;
  optional uint64 cache_creation_input_tokens = 4;
  optional uint64 cache_read_input_tokens = 5;
  optional uint64 total_input_tokens = 6;
}

message AmpMessageState {
  string state_type = 1;
  optional string stop_reason = 2;
}

message AmpRelationship {
  string thread_id = 1;
  // "handoff", "fork", or "mention".
  string rel_type = 2;
  // "parent" or "child".
  optional string role = 3;
}
